      const buildMotionComponent = (Tag) => {
        return ({ children, initial, animate, whileInView, viewport, transition = {}, style = {}, ...rest }) => {
          const ref = useRef(null);
          const [active, setActive] = useState(!whileInView);
          const target = whileInView || animate || {};
          const finalStyle = Object.fromEntries(
            Object.entries(target).map(([key, value]) => [key, Array.isArray(value) ? value[value.length - 1] : value])
          );
          const duration = transition.duration || 0.7;
          const delay = transition.delay || 0;
          const mergedStyle = {
            ...style,
            ...(active ? finalStyle : (initial || {})),
            transition: `all ${duration}s cubic-bezier(0.16, 1, 0.3, 1) ${delay}s`,
          };

          useEffect(() => {
            if (!whileInView) {
              const id = requestAnimationFrame(() => setActive(true));
              return () => cancelAnimationFrame(id);
            }
            const el = ref.current;
            if (!el) return;
            const obs = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) setActive(true);
              });
            }, { threshold: viewport?.amount || 0.1 });
            obs.observe(el);
            return () => obs.disconnect();
          }, []);

          return <Tag ref={ref} style={mergedStyle} {...rest}>{children}</Tag>;
        };
      };
      window.Motion = {
        motion: new Proxy({}, {
          get: (_, tag) => buildMotionComponent(tag),
        }),
      };

    function FadingVideo({ src, className, style }) {
      const ref = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);
      const timeoutRef = useRef(null);

      useEffect(() => {
        const video = ref.current;
        if (!video) return;
        const FADE_MS = 500;
        const FADE_OUT_LEAD = 0.55;

        const fadeTo = (target, duration) => {
          cancelAnimationFrame(rafRef.current);
          const start = performance.now();
          const initial = Number.parseFloat(video.style.opacity || "0") || 0;
          const step = (now) => {
            const progress = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            video.style.opacity = String(initial + (target - initial) * eased);
            if (progress < 1) rafRef.current = requestAnimationFrame(step);
          };
          rafRef.current = requestAnimationFrame(step);
        };

        const onLoadedData = () => {
          video.style.opacity = "0";
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };
        const onTimeUpdate = () => {
          if (!video.duration) return;
          const remaining = video.duration - video.currentTime;
          if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };
        const onEnded = () => {
          video.style.opacity = "0";
          timeoutRef.current = setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoadedData);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);
        video.load();

        return () => {
          cancelAnimationFrame(rafRef.current);
          clearTimeout(timeoutRef.current);
          video.removeEventListener("loadeddata", onLoadedData);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, [src]);

      return (
        <video
          ref={ref}
          className={`${className} video-fallback`}
          style={{ ...style, opacity: 0 }}
          autoPlay
          muted
          playsInline
          preload="auto"
          src={src}
        />
      );
    }

    function BlurText({ text, className }) {

        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver((entries) => {

            if (entry.isIntersecting) setVisible(true);
          });
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      return (

              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: (index * 100) / 1000 }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }
